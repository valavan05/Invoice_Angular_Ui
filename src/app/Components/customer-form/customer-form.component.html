<!-- customer-form.component.html -->
<div class="customer-form-small" style="margin: 20px">
  <h3>{{ isEdit ? "Edit Customer" : "Create Customer" }}</h3>
  <mat-dialog-content>
    <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="form">

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Customer Code</mat-label>
          <input matInput formControlName="customerCode" appSelectOnFocus />
          <mat-error *ngIf="(isSubmitted || f['customerCode'].touched) && f['customerCode'].errors?.['required']">
            <mat-icon color="warn">error</mat-icon> Customer Code is required
          </mat-error>
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Customer Name</mat-label>
          <input matInput formControlName="customerName" appSelectOnFocus />
          <mat-error *ngIf="(isSubmitted || f['customerName'].touched) && f['customerName'].errors?.['required']">
            <mat-icon color="warn">error</mat-icon> Customer Name is required
          </mat-error>
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Contact Person</mat-label>
          <input matInput formControlName="contactPerson" appSelectOnFocus />
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Mobile No</mat-label>
          <input matInput formControlName="mobileNo" (keypress)="allowOnlyNumbers($event)" appSelectOnFocus />
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" appSelectOnFocus />
          <mat-error *ngIf="f['email'].errors?.['email']">
            <mat-icon color="warn">error</mat-icon> Invalid email
          </mat-error>
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Address 1</mat-label>
          <textarea matInput rows="2" formControlName="address1" appSelectOnFocus></textarea>
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Address 2</mat-label>
          <textarea matInput rows="2" formControlName="address2" appSelectOnFocus></textarea>
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>City</mat-label>
          <input matInput formControlName="city" appSelectOnFocus />
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>State</mat-label>
          <input matInput formControlName="state" appSelectOnFocus />
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Country</mat-label>
          <input matInput formControlName="country" appSelectOnFocus />
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Zip Code</mat-label>
          <input matInput formControlName="zipCode" appSelectOnFocus />
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>GST No</mat-label>
          <input matInput formControlName="gstNo" appSelectOnFocus />
        </mat-form-field>
      </div>

      <div class="form-field">
        <mat-label>Is Active?</mat-label>
        <mat-radio-group formControlName="isActive" class="radio-group">
          <mat-radio-button [value]="true" color="primary">Active</mat-radio-button>
          <mat-radio-button [value]="false" color="warn">Inactive</mat-radio-button>
        </mat-radio-group>
      </div>
      
      <br />

      <button mat-flat-button color="primary">
        {{ isEdit ? "Update" : "Save" }}
      </button>

      <button mat-stroked-button (click)="dialogRef.close()" style="margin-left:10px">
        Cancel
      </button>

    </form>
  </mat-dialog-content>
</div>
