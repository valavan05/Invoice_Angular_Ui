<div style="margin: 20px">
  <div *ngIf="isLoading">Loading....</div>
 
 
  <form
    [formGroup]="filterForm"
    style="margin-bottom: 10px; display: flex; gap: 10px"
  >
    <mat-form-field appearance="outline">
      <mat-label>Category Code</mat-label>
      <input matInput formControlName="Code" />
    </mat-form-field>
 
    <mat-form-field appearance="outline">
      <mat-label> Name</mat-label>
      <input matInput formControlName="Name" />
    </mat-form-field>
 
    <button mat-stroked-button type="button" (click)="clearFilters()">
      Clear
    </button>
 
    <button
      mat-flat-button
      color="primary"
      type="button"
      (click)="openAddDialog()"
    >
      Add Category 
    </button>
  </form>
 
  <table
    mat-table
    [dataSource]="dataSource"
    matSort
    class="mat-elevation-z8"
    style="width: 100%"
  >
    <ng-container matColumnDef="Code">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Code</th>
      <td mat-cell *matCellDef="let Cat">{{ Cat.code }}</td>
    </ng-container>
 
    <ng-container matColumnDef="Name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
      <td mat-cell *matCellDef="let Cat">
        {{ Cat.name | slice: 0 : 25 }}
      </td>
    </ng-container>
 
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Description</th>
      <td mat-cell *matCellDef="let Cat">
        {{ Cat.description | slice: 0 : 25 }}
      </td>
    </ng-container>
 
    <ng-container matColumnDef="isActive">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let Cat">{{ Cat.isActive }}</td>
    </ng-container>
 
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let Cat">
        <button mat-flat-button color="primary" (click)="openEditDialog(Cat)">
          Edit
        </button>
       
        <button
          mat-flat-button
          color="warn"
          (click)="delete(Cat.id, Cat.name)"
        >
          Delete
        </button>
      </td>
    </ng-container>
 
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
 
  <mat-paginator
    [length]="totalRecords"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    [pageSizeOptions]="[5, 10, 25, 50]"
    showFirstLastButtons
    (page)="onPageChange($event)"
  >
  </mat-paginator>
</div>
