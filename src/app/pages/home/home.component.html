<div class="login-box">
       <h2> Login</h2>
       User Name : <input [(ngModel)]="userName" placeholder="User Name" />
       Password : <input [(ngModel)]="password" type="password" placeholder="Password" />
       <button (click)="login()">Login</button>
       <div *ngIf="isLoginSuccess === true" class="color-green">
            {{message}}
       </div>
 
       <div *ngIf="isLoginSuccess === false" class="color-red">
          {{message}}
       </div>
  </div>
